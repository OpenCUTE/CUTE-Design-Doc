# Markdown lint 配置
# 继承默认规则，针对中文文档做以下调整

MD009: false      # 允许行尾空格（中文排版习惯）
MD013: false      # 不限制行长度（中文段落不适合硬换行）
MD031: false      # 允许代码块与上下文紧邻（表格/列表中的示例较多）
MD032: false      # 允许列表与上下文紧邻（中文说明段落较多）
MD033: false      # 允许内嵌 HTML（WaveDrom/Mermaid 需要）
MD034: false      # 允许裸 URL（参考链接和配置说明中较常见）
MD040: false      # 允许未标注语言的代码块（伪代码/数据布局较多）
MD041: false      # 允许非标题开头（index.md 可能以导航开头）
MD024: false      # 允许重复标题名（不同层级 index.md 会重复）
MD060: false      # 不强制表格列风格（现有表格分隔线风格不统一）
